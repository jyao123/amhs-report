<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AMHS Report">
<meta name="theme-color" content="#1A2E1A">
<title>Amalayon Report</title>
<link rel="manifest" href="#" id="manifest-placeholder">
<script src="https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js"></script>
<style>
:root {
  --gd: #1A2E1A; --gm: #3A6B35; --ga: #4CAF50;
  --gl: #D6E8D0; --gp: #EAF2E6; --bg: #F2F5F0;
  --wh: #FFFFFF; --bd: #C2D4BC; --tx: #182418;
  --tm: #4A5E47; --td: #8A9E86;
  --rd: #D32F2F; --or: #E65100; --bl: #1565C0;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--tx)}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;z-index:100;background:var(--gd);padding-top:env(safe-area-inset-top)}
.nav-accent{height:4px;background:var(--ga)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;padding:12px 16px}
.nav-logo{font-size:16px;font-weight:700;color:var(--ga);letter-spacing:1px}
.nav-sub{font-size:10px;color:var(--td);letter-spacing:1px}
.nav-date{background:var(--ga);color:var(--gd);font-size:11px;font-weight:700;padding:4px 10px;border-radius:4px}

/* TABS */
.tabs{display:flex;background:var(--gd);border-top:1px solid rgba(255,255,255,0.1)}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:var(--td);cursor:pointer;border:none;background:none;letter-spacing:.5px;transition:all .2s}
.tab.active{color:var(--ga);border-bottom:2px solid var(--ga)}

/* CONTENT */
.content{padding-top:calc(env(safe-area-inset-top) + 96px);padding-bottom:100px;min-height:100%}
.page{display:none;padding:16px}
.page.active{display:block}

/* SUMMARY BAR */
.summary{background:var(--gd);border-radius:10px;padding:14px 16px;margin-bottom:18px;display:flex;gap:0;overflow-x:auto}
.sum-item{flex:1;min-width:70px;display:flex;flex-direction:column;gap:2px;padding:0 8px;border-right:1px solid rgba(255,255,255,0.1)}
.sum-item:last-child{border-right:none}
.sum-label{font-size:9px;color:var(--td);letter-spacing:1px;text-transform:uppercase}
.sum-val{font-size:20px;font-weight:700;color:var(--ga)}

/* SECTION */
.sec{margin-bottom:18px}
.sec-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--gm);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sec-title::before{content:'';width:3px;height:14px;background:var(--ga);border-radius:2px;display:inline-block}
.sec-title::after{content:'';flex:1;height:.5px;background:var(--bd)}

/* CARD */
.card{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:14px;margin-bottom:8px}
.card-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.card-label{font-size:12px;font-weight:700;color:var(--gm)}
.rm-btn{background:none;border:none;color:var(--rd);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:4px;font-family:inherit}

/* FIELDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.g4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px}
.gmt{margin-top:10px}
.field{display:flex;flex-direction:column;gap:4px}
.field label{font-size:11px;color:var(--td);font-weight:600}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--tx);background:var(--bg);border:1px solid var(--bd);border-radius:6px;padding:8px 10px;width:100%;outline:none;-webkit-appearance:none}
input:focus,select:focus,textarea:focus{border-color:var(--ga);background:var(--wh)}
textarea{resize:vertical;min-height:64px;line-height:1.5}

/* ADD BTN */
.add-btn{width:100%;padding:10px;background:var(--gp);border:1px dashed var(--gm);border-radius:8px;font-size:13px;color:var(--gm);cursor:pointer;font-family:inherit;font-weight:600;margin-top:4px}

/* NOTE */
.note{background:#FFFDE7;border-left:3px solid #F9A825;border-radius:0 8px 8px 0;padding:10px 12px;font-size:12px;color:#5D4037;margin-bottom:10px}

/* BOTTOM BAR */
.bottom-bar{position:fixed;bottom:0;left:0;right:0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--bg) 80%,transparent);z-index:50}
.gen-btn{width:100%;padding:15px;background:var(--gm);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s}
.gen-btn:active{background:var(--gd);transform:scale(.98)}
.gen-btn:disabled{opacity:.6}
.status{margin-top:8px;padding:10px 14px;border-radius:8px;font-size:13px;font-weight:600;text-align:center;display:none}
.status.ok{background:#E8F5E9;border:1px solid var(--ga);color:#1B5E20}
.status.err{background:#FFEBEE;border:1px solid var(--rd);color:#B71C1C}
.status.saving{background:var(--gp);border:1px solid var(--ga);color:var(--gm)}

/* WEEKLY STAT CARDS */
.w-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.w-card{background:var(--wh);border:1px solid var(--bd);border-radius:10px;padding:14px;border-top:3px solid var(--ga)}
.w-card-label{font-size:10px;color:var(--td);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.w-card-val{font-size:24px;font-weight:700;color:var(--gm)}
.w-card-sub{font-size:11px;color:var(--td);margin-top:2px}

/* WEEKLY TABLE */
.w-table{width:100%;border-collapse:collapse;margin-bottom:16px;background:var(--wh);border-radius:10px;overflow:hidden;border:1px solid var(--bd)}
.w-table th{background:var(--gl);color:var(--gm);font-size:11px;font-weight:700;padding:8px 10px;text-align:left}
.w-table td{font-size:12px;padding:8px 10px;border-top:1px solid var(--bd);color:var(--tx)}
.w-table tr:nth-child(even) td{background:var(--gp)}

/* LOADING */
.loading{text-align:center;padding:40px 20px;color:var(--td);font-size:14px}

@media(max-width:400px){
  .g4{grid-template-columns:1fr 1fr}
  .g3{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<!-- DAILY PAGE -->
<div class="content">
<div class="page active" id="page-daily">

  <div class="summary">
    <div class="sum-item"><span class="sum-label">Tray</span><span class="sum-val" id="s-tray">0 ft</span></div>
    <div class="sum-item"><span class="sum-label">Cable</span><span class="sum-val" id="s-cable">0</span></div>
    <div class="sum-item"><span class="sum-label">Issues</span><span class="sum-val" id="s-issues">0</span></div>
    <div class="sum-item"><span class="sum-label">Mats</span><span class="sum-val" id="s-mats">0</span></div>
  </div>

  <div class="sec">
    <div class="sec-title">Basic Info</div>
    <div class="card">
      <div class="g2">
        <div class="field"><label>Date</label><input type="date" id="f-date" oninput="updateDate()"></div>
        <div class="field"><label>Foreman</label><input id="f-foreman" placeholder="Name"></div>
      </div>
      <div class="field gmt"><label>Today's Highlights</label>
        <textarea id="f-highlights" placeholder="What did you work on? Where? Any blockers?"></textarea>
      </div>
    </div>
  </div>

  <div class="sec">
    <div class="sec-title">Tray Installation</div>
    <div id="tray-list"></div>
    <button class="add-btn" onclick="addTray()">+ Add Tray Run</button>
  </div>

  <div class="sec">
    <div class="sec-title">Cable Pulling</div>
    <div id="cable-list"></div>
    <button class="add-btn" onclick="addCable()">+ Add Cable Type</button>
  </div>

  <div class="sec">
    <div class="sec-title">Challenges</div>
    <div id="issue-list"></div>
    <button class="add-btn" onclick="addIssue()">+ Add Challenge</button>
  </div>

  <div class="sec">
    <div class="sec-title">Materials Needed Tomorrow</div>
    <div class="note">最多 5 項 / Max 5 items</div>
    <div id="mat-list"></div>
    <button class="add-btn" id="mat-add-btn" onclick="addMat()">+ Add Material</button>
  </div>

  <div class="sec">
    <div class="sec-title">Tomorrow's Work Plan</div>
    <div class="card">
      <div class="field">
        <label>One item per line</label>
        <textarea id="f-plan" style="min-height:80px" placeholder="Continue tray Q10→R10&#10;Scissor lift required&#10;Pull 10-2C cables"></textarea>
      </div>
    </div>
  </div>

</div>

<!-- WEEKLY PAGE -->
<div class="page" id="page-weekly">
  <div id="weekly-content"><div class="loading">Loading weekly data...</div></div>
</div>
</div>

<!-- BOTTOM BAR DAILY -->
<div class="bottom-bar" id="bar-daily">
  <button class="gen-btn" id="gen-btn" onclick="generateDaily()">⬇ Generate Daily Report PPTX</button>
  <div class="status" id="d-status"></div>
</div>

<!-- BOTTOM BAR WEEKLY -->
<div class="bottom-bar" id="bar-weekly" style="display:none">
  <button class="gen-btn" id="gen-btn-w" onclick="generateWeekly()">⬇ Generate Weekly Report PPTX</button>
  <div class="status" id="w-status"></div>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxDscRS8J8iJXlYxfzjzKyKxaBoUc9hwLOzgEoQuVC4Iv-5KMpDvy6zVuEWybqqLBI/exec';
let tC=0,cC=0,iC=0,mC=0;
const TT=['Ladder Tray','Basket Tray','Tube Tray'];
const TS=['6×4','9×4','12×4','18×4','24×4','6×6','9×6','12×6','Custom'];
const CS=['10-2C','10-3C','8-3C','6-2C','6-3C','4-3C','2-3C','1-3C','Other'];
const CC=['Trade Clash','Access (Scaffold/Lift)','Permit / Hold','Material Delay','Other'];
const ST=['Open','In Progress','Resolved'];

function opts(a){return a.map(x=>`<option>${x}</option>`).join('')}
function v(id){return(document.getElementById(id)?.value||'').trim()}
function rm(id){document.getElementById(id)?.remove();recalc()}

function updateDate(){
  const d=v('f-date');
  if(d){const[y,m,dy]=d.split('-');document.getElementById('hdr-date').textContent=m+'/'+dy+'/'+y}
}

function recalc(){
  let ft=0;
  document.querySelectorAll('[id^="tf-"]').forEach(e=>ft+=parseFloat(e.value)||0);
  document.getElementById('s-tray').textContent=Math.round(ft)+' ft';
  document.getElementById('s-cable').textContent=document.querySelectorAll('[id^="cable-"]').length;
  document.getElementById('s-issues').textContent=document.querySelectorAll('[id^="issue-"]').length;
  document.getElementById('s-mats').textContent=document.querySelectorAll('[id^="mat-"]').length;
  const mb=document.getElementById('mat-add-btn');
  if(mb)mb.style.display=document.querySelectorAll('[id^="mat-"]').length>=5?'none':'';
}

function addTray(){
  tC++;const id=tC;
  const d=document.createElement('div');
  d.className='card';d.id='tray-'+id;
  d.innerHTML=`<div class="card-hd"><span class="card-label">Tray Run ${id}</span><button class="rm-btn" onclick="rm('tray-${id}')">✕</button></div>
  <div class="g2">
    <div class="field"><label>Type</label><select id="tt-${id}">${opts(TT)}</select></div>
    <div class="field"><label>Size</label><select id="ts-${id}">${opts(TS)}</select></div>
  </div>
  <div class="g2 gmt">
    <div class="field"><label>Custom Size</label><input id="tc-${id}" placeholder="e.g. 15×4"></div>
    <div class="field"><label>Length (ft)</label><input type="number" id="tf-${id}" placeholder="0" min="0" oninput="recalc()"></div>
  </div>
  <div class="g2 gmt">
    <div class="field"><label>Location</label><input id="tl-${id}" placeholder="e.g. N10→Q10"></div>
    <div class="field"><label>Notes</label><input id="tn-${id}" placeholder="e.g. blocked at Q10"></div>
  </div>`;
  document.getElementById('tray-list').appendChild(d);recalc();
}

function addCable(){
  cC++;const id=cC;
  const d=document.createElement('div');
  d.className='card';d.id='cable-'+id;
  d.innerHTML=`<div class="card-hd"><span class="card-label">Cable ${id}</span><button class="rm-btn" onclick="rm('cable-${id}')">✕</button></div>
  <div class="g2">
    <div class="field"><label>Size</label><select id="cs-${id}">${opts(CS)}</select></div>
    <div class="field"><label>Custom</label><input id="cc-${id}" placeholder="e.g. 350MCM"></div>
  </div>
  <div class="g2 gmt">
    <div class="field"><label>Ft Pulled</label><input type="number" id="cf-${id}" placeholder="0" min="0" oninput="recalc()"></div>
    <div class="field"><label>Runs</label><input type="number" id="cr-${id}" placeholder="1" min="1"></div>
  </div>
  <div class="field gmt"><label>From → To</label><input id="crt-${id}" placeholder="e.g. DP-B01→N10"></div>`;
  document.getElementById('cable-list').appendChild(d);recalc();
}

function addIssue(){
  iC++;const id=iC;
  const d=document.createElement('div');
  d.className='card';d.id='issue-'+id;
  d.innerHTML=`<div class="card-hd"><span class="card-label">Challenge ${id}</span><button class="rm-btn" onclick="rm('issue-${id}')">✕</button></div>
  <div class="g2">
    <div class="field"><label>Category</label><select id="ic-${id}">${opts(CC)}</select></div>
    <div class="field"><label>Status</label><select id="is-${id}">${opts(ST)}</select></div>
  </div>
  <div class="field gmt"><label>Description</label><textarea id="id-${id}" placeholder="Describe the issue and impact"></textarea></div>`;
  document.getElementById('issue-list').appendChild(d);recalc();
}

function addMat(){
  if(document.querySelectorAll('[id^="mat-"]').length>=5)return;
  mC++;const id=mC;
  const d=document.createElement('div');
  d.className='card';d.id='mat-'+id;
  d.innerHTML=`<div class="card-hd"><span class="card-label">Material ${id}</span><button class="rm-btn" onclick="rm('mat-${id}')">✕</button></div>
  <div class="g2">
    <div class="field"><label>Item</label><input id="mi-${id}" placeholder="e.g. Ladder Tray"></div>
    <div class="field"><label>Size</label><input id="ms-${id}" placeholder="e.g. 12×4"></div>
  </div>
  <div class="g2 gmt">
    <div class="field"><label>Qty</label><input id="mq-${id}" placeholder="e.g. 10"></div>
    <div class="field"><label>Unit</label><input id="mu-${id}" placeholder="e.g. EA"></div>
  </div>
  <div class="field gmt"><label>Purpose</label><input id="mn-${id}" placeholder="e.g. Continue R10 run"></div>`;
  document.getElementById('mat-list').appendChild(d);recalc();
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('bar-daily').style.display=tab==='daily'?'':'none';
  document.getElementById('bar-weekly').style.display=tab==='weekly'?'':'none';
  event.target.classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if(tab==='weekly')loadWeekly();
}

// ── GENERATE DAILY ────────────────────────────────────────────────────────────
async function generateDaily(){
  const btn=document.getElementById('gen-btn');
  const status=document.getElementById('d-status');
  btn.disabled=true;btn.textContent='⏳ Generating...';
  status.style.display='block';status.className='status saving';status.textContent='Saving data & generating PPTX...';

  const rawDate=v('f-date');
  let dateLabel='—';
  if(rawDate){const[y,m,d]=rawDate.split('-');dateLabel=m+'/'+d+'/'+y;}

  let trayRuns=[],trayTotal=0;
  document.querySelectorAll('[id^="tray-"]').forEach(card=>{
    const n=card.id.split('-')[1];
    const sz=v('ts-'+n)==='Custom'&&v('tc-'+n)?v('tc-'+n):v('ts-'+n);
    const ft=parseFloat(v('tf-'+n))||0;
    if(ft===0&&!v('tl-'+n))return;
    trayTotal+=ft;
    trayRuns.push({type:v('tt-'+n)||'Ladder Tray',size:sz,ft,location:v('tl-'+n),notes:v('tn-'+n)});
  });

  let cableRuns=[];
  document.querySelectorAll('[id^="cable-"]').forEach(card=>{
    const n=card.id.split('-')[1];
    const sz=v('cs-'+n)==='Other'&&v('cc-'+n)?v('cc-'+n):v('cs-'+n);
    const ft=parseFloat(v('cf-'+n))||0;
    if(ft===0)return;
    cableRuns.push({size:sz,ft,runs:v('cr-'+n)||'1',route:v('crt-'+n)});
  });

  let challenges=[];
  document.querySelectorAll('[id^="issue-"]').forEach(card=>{
    const n=card.id.split('-')[1];
    challenges.push({category:v('ic-'+n),status:v('is-'+n),desc:v('id-'+n)});
  });

  let materials=[];
  document.querySelectorAll('[id^="mat-"]').forEach(card=>{
    const n=card.id.split('-')[1];
    materials.push({item:v('mi-'+n),size:v('ms-'+n),qty:v('mq-'+n),unit:v('mu-'+n),notes:v('mn-'+n)});
  });
  while(materials.length<5)materials.push({item:'',size:'',qty:'',unit:'',notes:''});

  const planLines=(v('f-plan')||'').split('\n').filter(l=>l.trim());
  const totalCable=cableRuns.reduce((s,r)=>s+r.ft,0);

  // Save to Google Sheet
  try{
    await fetch(API,{
      method:'POST',
      body:JSON.stringify({
        date:dateLabel,foreman:v('f-foreman'),
        trayTotalFt:Math.round(trayTotal),trayRuns,
        cableTotalFt:Math.round(totalCable),cableRuns,
        challenges,materials,
        plan:v('f-plan'),highlights:v('f-highlights')
      })
    });
  }catch(e){console.warn('Save failed:',e);}

  // Build PPTX
  try{
    await buildDailyPPTX({dateLabel,trayRuns,trayTotal,cableRuns,totalCable,challenges,materials,planLines,foreman:v('f-foreman')});
    status.className='status ok';status.textContent='✅ Downloaded! Data saved to Google Sheets.';
  }catch(e){
    status.className='status err';status.textContent='❌ Error: '+e.message;
  }
  btn.disabled=false;btn.textContent='⬇ Generate Daily Report PPTX';
}

// ── PPTX BUILDER ─────────────────────────────────────────────────────────────
async function buildDailyPPTX({dateLabel,trayRuns,trayTotal,cableRuns,totalCable,challenges,materials,planLines,foreman}){
  const BG='F2F5F0',HDR='1A2E1A',GREEN='3A6B35',ACC='4CAF50';
  const GL='D6E8D0',GP='EAF2E6',WH='FFFFFF',BD='C2D4BC';
  const TX='182418',TM='4A5E47',TD='8A9E86',TON='F0F7EE';
  const RD='D32F2F',OR='E65100',BL='1565C0';

  else{trayRuns.forEach((r,ri)=>tRow(s1,[r.type,r.size,r.ft+' ft',r.location||'—',r.notes||'—'],TW,TX2,TY+.62+ri*.3,ri%2===1));tTot(s1,['TOTAL','',Math.round(trayTotal)+' ft','',''],TW,TX2,TY+.62+trayRuns.length*.3);}
  const CX2=5.18,CY=2.06;

  const CH=['Size','Ft Pulled','Runs','Route'],CW=[.82,.86,.6,2.27];

  else{s2.addText('—',{x:.42,y:4.42,w:9.1,h:.5,fontFace:FB,fontSize:10.5,color:TD,italic:true});}
  addFtr(s2);

  await pres.writeFile({fileName:'AMHS_Daily_'+( rawDate ? rawDate.replace(/-/g,'') : 'report')+'.pptx'});

var rawDate='';

// ── LOAD WEEKLY ───────────────────────────────────────────────────────────────
async function loadWeekly(){
  const el=document.getElementById('weekly-content');
  el.innerHTML='<div class="loading">Loading 7-day data...</div>';
  try{
    const res=await fetch(API+'?t='+Date.now());
    const json=await res.json();
    if(!json.data||json.data.length===0){el.innerHTML='<div class="loading">No data yet. Submit at least one daily report first.</div>';return;}
    const rows=json.data.slice(-7);
    const totalTray=rows.reduce((s,r)=>s+(parseFloat(r.trayTotalFt)||0),0);
    const totalCable=rows.reduce((s,r)=>s+(parseFloat(r.cableTotalFt)||0),0);
    const allChallenges=rows.reduce((s,r)=>{try{return s+(JSON.parse(r.challenges)||[]).length}catch{return s}},0);
    let html=`
    <div class="w-cards">
      <div class="w-card"><div class="w-card-label">Total Tray</div><div class="w-card-val">${Math.round(totalTray)} ft</div><div class="w-card-sub">${rows.length} days</div></div>
      <div class="w-card"><div class="w-card-label">Total Cable</div><div class="w-card-val">${Math.round(totalCable)} ft</div><div class="w-card-sub">${rows.length} days</div></div>
    </div>
    <div class="sec"><div class="sec-title">Daily Breakdown</div>
    <table class="w-table"><thead><tr><th>Date</th><th>Foreman</th><th>Tray ft</th><th>Cable ft</th></tr></thead><tbody>`;
    rows.forEach(r=>{html+=`<tr><td>${r.date||'—'}</td><td>${r.foreman||'—'}</td><td>${r.trayTotalFt||0}</td><td>${r.cableTotalFt||0}</td></tr>`;});
    html+=`</tbody></table></div>
    <div class="sec"><div class="sec-title">This Week's Challenges</div>`;
    rows.forEach(r=>{
      try{const chs=JSON.parse(r.challenges)||[];chs.forEach(c=>{html+=`<div class="card" style="margin-bottom:6px"><div style="font-size:11px;color:var(--td)">${r.date}</div><div style="font-size:13px;font-weight:600;color:var(--gm)">${c.category} — ${c.status}</div><div style="font-size:12px;margin-top:4px">${c.desc}</div></div>`;});}catch{}
    });
    html+=`</div>`;
    el.innerHTML=html;
    window._weeklyData={rows,totalTray,totalCable};
  }catch(e){el.innerHTML='<div class="loading">Failed to load. Check connection.</div>';}
}

    // Stat cards
    [{label:'TOTAL TRAY',val:Math.round(totalTray)+' ft',sub:rows.length+' days'},{label:'TOTAL CABLE',val:Math.round(totalCable)+' ft',sub:rows.length+' days'},{label:'DAILY REPORTS',val:String(rows.length),sub:'this week'}].forEach((c,i)=>{

    s1.addText('DAILY BREAKDOWN',{x:.39,y:2.08,w:9.34,h:.28,fontFace:FT,fontSize:9.5,bold:true,color:'4A5E47',charSpacing:2});
    s1.addShape(pres.ShapeType.line,{x:.27,y:2.38,w:9.46,h:0,line:{color:BD,pt:.75}});
    const DH=['Date','Foreman','Tray ft','Cable ft'],DW=[1.8,2.2,2.5,2.96];

        R(s1,dx,ry,DW[ci],.29,ri%2===1?GP:WH,BD);
        s1.addText(cell,{x:dx+.07,y:ry,w:DW[ci]-.1,h:.29,fontFace:FB,fontSize:9.5,color:TX,valign:'middle'});
